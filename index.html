<!DOCTYPE html>
<html>
<head>
  <title>Smart Lab Assistant</title>
</head>

<body style="font-family: Arial; text-align: center; margin-top: 50px;">

<h1>🧪 Smart Lab Assistant</h1>

<input id="experiment" placeholder="Enter experiment name">
<br><br>

<button onclick="generate()">Generate</button>

<p id="output" style="margin-top:20px;"></p>

<script>
async function generate() {
  let exp = document.getElementById("experiment").value;

  let apiKey = "AIzaSyBVtatTtrulViRZn3s4A_qyjP4b9cDug3Q"; // 

  let response = await fetch(
    "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + apiKey,
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [{
            text: "Explain the experiment " + exp + " with aim, materials, procedure, safety, and result."
          }]
        }]
      })
    }
  );

  let data = await response.json();

  if (data.candidates) {
    let output = data.candidates[0].content.parts[0].text;
    document.getElementById("output").innerText = output;
  } else {
    document.getElementById("output").innerText = "Error getting response";
  }
}
</script>

</body>
</html>
