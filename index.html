<script>
function generate() {
  let exp = document.getElementById("experiment").value;

  let output = `
  Experiment: ${exp}

  Aim:
  To perform ${exp} experiment.

  Materials:
  Test tubes, reagents, microscope, etc.

  Procedure:
  1. Prepare sample
  2. Add reagents
  3. Observe results

  Safety:
  Wear gloves and lab coat.

  Expected Result:
  Successful observation of ${exp}.
  `;

  document.getElementById("output").innerText = output;
}
</script>
