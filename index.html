<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Lab Assistant | AI-powered lab guide</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #f0f4f8;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .chat-container {
            max-width: 800px;
            width: 100%;
            height: 90vh;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .chat-header {
            background: #1e3a8a;
            color: white;
            padding: 1.2rem;
            text-align: center;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .chat-header span {
            font-size: 0.8rem;
            font-weight: normal;
            opacity: 0.8;
            display: block;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: #f9fafc;
        }
        .message {
            max-width: 85%;
            padding: 0.7rem 1rem;
            border-radius: 1.5rem;
            line-height: 1.4;
            word-wrap: break-word;
            font-size: 0.95rem;
        }
        .user {
            background: #1e3a8a;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 0.2rem;
        }
        .ai {
            background: #e5e7eb;
            color: #111827;
            align-self: flex-start;
            border-bottom-left-radius: 0.2rem;
        }
        .error {
            background: #fee2e2;
            color: #b91c1c;
            align-self: center;
            font-size: 0.8rem;
            border-radius: 1rem;
            max-width: 90%;
        }
        .input-area {
            display: flex;
            padding: 1rem;
            background: white;
            border-top: 1px solid #e2e8f0;
            gap: 0.5rem;
        }
        .input-area input {
            flex: 1;
            padding: 0.8rem 1rem;
            border: 1px solid #cbd5e1;
            border-radius: 2rem;
            font-size: 1rem;
            outline: none;
            transition: 0.2s;
        }
        .input-area input:focus {
            border-color: #1e3a8a;
            box-shadow: 0 0 0 2px rgba(30,58,138,0.2);
        }
        .input-area button {
            background: #1e3a8a;
            color: white;
            border: none;
            padding: 0 1.5rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .input-area button:active {
            transform: scale(0.96);
            background: #0f2b6d;
        }
        .typing {
            font-style: italic;
            color: #6c757d;
            background: #e9ecef;
            align-self: flex-start;
            padding: 0.5rem 1rem;
            border-radius: 1rem;
        }
        @media (max-width: 600px) {
            .message { max-width: 90%; }
            .chat-header { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="chat-header">
        🧪 Smart Lab Assistant
        <span>Powered by NVIDIA NIM (DeepSeek V3.1)</span>
    </div>
    <div class="messages" id="messages">
        <div class="message ai">👋 Hello! I'm your lab assistant. Ask me anything about experiments, safety, protocols, or equipment.</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="e.g., How to prepare 1M NaCl solution?" autocomplete="off">
        <button id="sendBtn">Send</button>
    </div>
</div>

<script>
    const messagesDiv = document.getElementById('messages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // Auto-resize input on mobile? not needed, but focus works.
    function addMessage(text, sender) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `message ${sender}`;
        msgDiv.innerText = text;
        messagesDiv.appendChild(msgDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    function showError(errorText) {
        const errDiv = document.createElement('div');
        errDiv.className = 'message error';
        errDiv.innerText = `⚠️ ${errorText}`;
        messagesDiv.appendChild(errDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
    }

    let isWaiting = false;

    async function sendMessage() {
        if (isWaiting) return;
        const msg = userInput.value.trim();
        if (!msg) return;

        // Clear input and add user message
        userInput.value = '';
        addMessage(msg, 'user');
        isWaiting = true;

        // Show typing indicator
        const typingDiv = document.createElement('div');
        typingDiv.className = 'message ai typing';
        typingDiv.innerText = '🤔 Thinking...';
        messagesDiv.appendChild(typingDiv);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;

        try {
            const response = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: msg })
            });

            const data = await response.json();

            // Remove typing indicator
            typingDiv.remove();

            if (!response.ok) {
                showError(data.error || `Server error (${response.status})`);
            } else if (data.reply) {
                addMessage(data.reply, 'ai');
            } else {
                showError('No reply from AI. Please try again.');
            }
        } catch (err) {
            typingDiv.remove();
            showError(`Network error: ${err.message}. Check your connection.`);
        } finally {
            isWaiting = false;
            userInput.focus();
        }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body>
</html>
