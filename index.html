<!DOCTYPE html>
<html>
<head>
    <title>Smart Lab Assistant</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; padding: 1rem; max-width: 600px; margin: auto; }
        #chat { border: 1px solid #ccc; height: 400px; overflow-y: auto; padding: 1rem; margin-bottom: 1rem; background: #f9f9f9; }
        .user { text-align: right; color: blue; margin: 0.5rem 0; }
        .ai { text-align: left; color: green; margin: 0.5rem 0; }
        .error { text-align: left; color: red; margin: 0.5rem 0; }
        input { width: 70%; padding: 0.5rem; }
        button { padding: 0.5rem 1rem; }
    </style>
</head>
<body>
    <h1>Smart Lab Assistant (Gemini)</h1>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Ask about lab experiments...">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;

    const chatDiv = document.getElementById('chat');
    chatDiv.innerHTML += `<div class="user"><strong>You:</strong> ${msg}</div>`;
    input.value = '';

    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        if (!res.ok) {
            // Show the error in red
            chatDiv.innerHTML += `<div class="error"><strong>Error ${res.status}:</strong> ${data.error || 'Unknown error'}</div>`;
        } else {
            chatDiv.innerHTML += `<div class="ai"><strong>AI:</strong> ${data.reply}</div>`;
        }
    } catch (err) {
        chatDiv.innerHTML += `<div class="error"><strong>Network Error:</strong> ${err.message}</div>`;
    }
    chatDiv.scrollTop = chatDiv.scrollHeight;
}
        }
    </script>
</body>
</html>
